name: Avangard CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-architecture:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Ruff
        run: uv run --group dev ruff check .

      - name: Check formatting
        run: uv run --group dev ruff format --check .

      - name: Check architecture import boundaries
        run: uv run --group dev python scripts/check_architecture_imports.py

  test-api-and-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint-and-architecture]
    services:
      dragonfly:
        image: docker.dragonflydb.io/dragonflydb/dragonfly:v1.27.1
        ports:
          - 6380:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Wait for Dragonfly
        run: |
          python - <<'PY'
          import socket
          import time

          for _ in range(120):
              try:
                  with socket.create_connection(("127.0.0.1", 6380), timeout=1):
                      break
              except OSError:
                  time.sleep(1)
          else:
              raise SystemExit("Dragonfly did not become ready in time")
          PY

      - name: Run unit and API tests
        env:
          DRAGONFLY_URL: redis://localhost:6380/15
        run: uv run --group dev pytest tests/unit tests/api

  test-integration-dragonfly:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint-and-architecture]
    services:
      dragonfly:
        image: docker.dragonflydb.io/dragonflydb/dragonfly:v1.27.1
        ports:
          - 6380:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Wait for Dragonfly
        run: |
          python - <<'PY'
          import socket
          import time

          for _ in range(120):
              try:
                  with socket.create_connection(("127.0.0.1", 6380), timeout=1):
                      break
              except OSError:
                  time.sleep(1)
          else:
              raise SystemExit("Dragonfly did not become ready in time")
          PY

      - name: Run Dragonfly integration tests
        env:
          DRAGONFLY_URL: redis://localhost:6380/15
        run: uv run --group dev pytest tests/integration/dragonfly

  test-integration-typesense:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint-and-architecture]
    services:
      typesense:
        image: typesense/typesense:27.1
        env:
          TYPESENSE_DATA_DIR: /tmp
          TYPESENSE_API_KEY: ci-typesense-key
          TYPESENSE_ENABLE_CORS: "true"
        ports:
          - 8109:8108

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Wait for Typesense
        run: |
          python - <<'PY'
          import socket
          import time

          for _ in range(120):
              try:
                  with socket.create_connection(("127.0.0.1", 8109), timeout=1):
                      break
              except OSError:
                  time.sleep(1)
          else:
              raise SystemExit("Typesense did not become ready in time")
          PY

      - name: Run Typesense integration tests
        env:
          TYPESENSE_URL: http://localhost:8109
          TYPESENSE_API_KEY: ci-typesense-key
          REQUIRE_TYPESENSE_INTEGRATION: "1"
        run: uv run --group dev pytest tests/integration/typesense

  compose-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      [
        test-api-and-unit,
        test-integration-dragonfly,
        test-integration-typesense,
      ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and wait for all services
        run: docker compose up -d --build --wait --wait-timeout 180

      - name: Verify app is reachable
        run: curl --fail --silent --show-error http://localhost:8000/health/ready > /dev/null

      - name: Check container status
        run: docker compose ps

      - name: Show service logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down stack
        if: always()
        run: docker compose down -v
